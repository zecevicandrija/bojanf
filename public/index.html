<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Bojan Fashion" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://localhost:3000/" />
  <meta property="og:title" content="Bojan Fashion" />
  <meta property="og:description" content="Bojan Fashion" />
  <meta property="og:image" content="%PUBLIC_URL%/novilogo.png" />

  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://localhost:3000/" />
  <meta property="twitter:title" content="Bojan Fashion" />
  <meta property="twitter:description" content="Bojan Fashion" />
  <meta property="twitter:image" content="%PUBLIC_URL%/novilogo.png" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/novilogo.png" />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <title>Bojan Fashion</title>

  <!-- FONT PRELOADS: Ubrzava renderovanje teksta i smanjuje layout shift -->
  <link rel="preload" href="%PUBLIC_URL%/fonts/OutfitVariableFont_wght1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="%PUBLIC_URL%/fonts/SpaceGrotesk[wght].woff2" as="font" type="font/woff2" crossorigin>

  <!-- PRELOAD HERO SLIKE (Ubrzava LCP) - STABILAN URL iz /public, bez hash-a -->
  <link rel="preload" as="image" href="%PUBLIC_URL%/bojan2.webp" fetchpriority="high">
  
  <style id="critical-css">
    @font-face {
      font-family: 'Outfit';
      src: url('%PUBLIC_URL%/fonts/OutfitVariableFont_wght1.woff2') format('woff2');
      font-weight: 100 1000;
      font-display: swap;
    }
    @font-face {
      font-family: 'Space Grotesk';
      src: url('%PUBLIC_URL%/fonts/SpaceGrotesk[wght].woff2') format('woff2');
      font-weight: 300 700;
      font-display: swap;
    }

    /* Stabilni base stilovi bez čekanja na main.css */
    :root { --bg-dark: #0A0A0A; --accent: #D4AF37; }
    body { background-color: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
    #root { width: 100%; min-height: 100vh; background-color: var(--bg-dark); }
    
    /* Navbar skeleton */
    .navbar { position: fixed; top: 1.5rem; left: 0; right: 0; height: 64px; z-index: 1000; }
    
    /* Hero Section placeholder */
    section[class*="heroSection"] { 
      background-color: var(--bg-dark); 
      min-height: 100vh; 
      display: flex; 
      align-items: center;
      visibility: visible !important;
    }
  </style>
</head>

<body>
  <noscript>Bojan Fashion</noscript>
  <div id="root"></div>
</body>

</html>
