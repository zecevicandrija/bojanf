  <!-- PRELOAD HERO SLIKE (Ubrzava LCP) - STABILAN URL iz /public, bez hash-a -->

  <style id="critical-css">
    /* Stabilni base stilovi bez čekanja na main.css */
    :root { --bg-dark: #0A0A0A; --accent: #D4AF37; }
    body { background-color: var(--bg-dark); margin: 0; padding: 0; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
    #root { width: 100%; min-height: 100vh; background-color: var(--bg-dark); }
    
    /* Navbar skeleton */
    .navbar { position: fixed; top: 1.5rem; left: 0; right: 0; height: 64px; z-index: 1000; }
    
    /* Hero Section placeholder */
    section[class*="heroSection"] { 
      background-color: var(--bg-dark); 
      min-height: 100vh; 
      display: flex; 
      align-items: center;
      visibility: visible !important;
    }
  </style>
</head>
